<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RK Health - Redirecting...</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('rk_session_active') === 'true') {
                window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'login.html';
            }
        });
    </script>
</head>
<body>
    <div style="font-family: 'Outfit', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; background: #f8fafc; color: #1e293b;">
        <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;"></div>
        <p>Redirecting to RK Health Portal...</p>
    </div>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
